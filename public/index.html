<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA Dashboard V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0a0a0f; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 15, 25, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-text { background: linear-gradient(to right, #f5c842, #e0a500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gold-border { border: 1px solid rgba(245, 200, 66, 0.2); }
        .btn-gold { background: linear-gradient(45deg, #f5c842, #e0a500); color: #000; font-weight: bold; transition: all 0.3s; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(245, 200, 66, 0.3); }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-bold flex items-center gap-3">
                    <i class="fas fa-shield-halved gold-text"></i>
                    <span class="gold-text">NOVA V2</span>
                </h1>
                <p class="text-gray-500 text-sm mt-1">Online License Management System</p>
            </div>
            <div class="flex gap-4">
                <button onclick="openModal()" class="btn-gold px-6 py-2 rounded-lg flex items-center gap-2">
                    <i class="fas fa-plus"></i> Generate License
                </button>
            </div>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass p-6 rounded-2xl gold-border">
                <p class="text-gray-400 text-sm">Total Serials</p>
                <h3 id="statTotal" class="text-3xl font-bold mt-2">0</h3>
            </div>
            <div class="glass p-6 rounded-2xl gold-border">
                <p class="text-gray-400 text-sm">Active Users</p>
                <h3 id="statActive" class="text-3xl font-bold mt-2 text-green-400">0</h3>
            </div>
            <div class="glass p-6 rounded-2xl gold-border">
                <p class="text-gray-400 text-sm">Revoked</p>
                <h3 id="statRevoked" class="text-3xl font-bold mt-2 text-red-400">0</h3>
            </div>
        </div>

        <!-- Table -->
        <div class="glass rounded-2xl overflow-hidden">
            <div class="p-6 border-b border-white/10 flex justify-between items-center">
                <h2 class="text-xl font-bold">Serial Keys</h2>
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-500"></i>
                    <input type="text" placeholder="Search serials..." class="bg-black/30 border border-white/10 rounded-lg pl-10 pr-4 py-2 text-sm focus:outline-none focus:border-gold-500 w-64">
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-gray-400 text-xs uppercase bg-black/20">
                        <tr>
                            <th class="px-6 py-4">Serial Key</th>
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4">Client</th>
                            <th class="px-6 py-4">HWID</th>
                            <th class="px-6 py-4">Last Pink</th>
                            <th class="px-6 py-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="serialBody" class="divide-y divide-white/5">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Generate Modal -->
    <div id="modal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden z-50">
        <div class="glass w-[400px] p-8 rounded-3xl gold-border animate-in fade-in zoom-in duration-300">
            <h2 class="text-2xl font-bold gold-text mb-6">Create New License</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Client Name</label>
                    <input id="clientName" type="text" placeholder="e.g. Ahmed Ali" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-gold-500">
                </div>
                <div id="resultBox" class="hidden">
                    <label class="block text-gray-400 text-sm mb-1">Generated Serial</label>
                    <div class="bg-black/50 p-4 rounded-xl text-center font-mono text-gold-text text-xl border border-yellow-500/20">
                        <span id="newKey">XXXX-XXXX-XXXX-XXXX</span>
                    </div>
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 px-6 py-3 rounded-xl border border-white/10 hover:bg-white/5">Cancel</button>
                    <button id="btnCreate" onclick="generateKey()" class="flex-1 btn-gold px-6 py-3 rounded-xl">Create</button>
                    <button id="btnFinish" onclick="closeModal()" class="hidden flex-1 btn-gold px-6 py-3 rounded-xl font-bold">Done</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function loadSerials() {
            try {
                const res = await fetch(`${API_BASE}/api/list`);
                const data = await res.json();
                const body = document.getElementById('serialBody');
                body.innerHTML = '';

                let activeCount = 0;
                let revokedCount = 0;

                data.forEach(item => {
                    if(item.status === 'active') activeCount++;
                    if(item.status === 'revoked') revokedCount++;

                    const statusClass = item.status === 'active' ? 'text-green-400' : (item.status === 'revoked' ? 'text-red-400' : 'text-gray-400');
                    
                    body.innerHTML += `
                        <tr class="transition-colors">
                            <td class="px-6 py-4 font-mono font-bold text-yellow-500">${item.serial}</td>
                            <td class="px-6 py-4">
                                <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase bg-white/5 ${statusClass}">
                                    ${item.status}
                                </span>
                            </td>
                            <td class="px-6 py-4">${item.client_name || '—'}</td>
                            <td class="px-6 py-4 text-xs font-mono text-gray-500">${item.hwid ? item.hwid.substring(0,8)+'...' : '—'}</td>
                            <td class="px-6 py-4 text-xs text-gray-400">${item.last_ping ? new Date(item.last_ping).toLocaleString() : 'Never'}</td>
                            <td class="px-6 py-4 text-center">
                                <button onclick="revokeKey('${item.serial}')" class="text-gray-500 hover:text-red-500 transition-colors">
                                    <i class="fas fa-ban"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });

                document.getElementById('statTotal').innerText = data.length;
                document.getElementById('statActive').innerText = activeCount;
                document.getElementById('statRevoked').innerText = revokedCount;

            } catch (e) {
                console.error("Failed to load serials:", e);
            }
        }

        async function generateKey() {
            const client = document.getElementById('clientName').value;
            const btn = document.getElementById('btnCreate');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            const res = await fetch(`${API_BASE}/api/generate`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ client })
            });
            const data = await res.json();
            
            document.getElementById('newKey').innerText = data.serial;
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('btnCreate').classList.add('hidden');
            document.getElementById('btnFinish').classList.remove('hidden');
            loadSerials();
        }

        async function revokeKey(serial) {
            if(!confirm(`Are you sure you want to revoke ${serial}?`)) return;
            await fetch(`${API_BASE}/api/revoke`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ serial })
            });
            loadSerials();
        }

        function openModal() {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('resultBox').classList.add('hidden');
            document.getElementById('btnCreate').classList.remove('hidden');
            document.getElementById('btnFinish').classList.add('hidden');
            document.getElementById('btnCreate').innerHTML = 'Create';
            document.getElementById('btnCreate').disabled = false;
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        loadSerials();
    </script>
</body>
</html>
